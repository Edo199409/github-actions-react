name: Test react app

on: push

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Get repository code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Test application
        run: npm test
